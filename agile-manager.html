<!DOCTYPE html>
<html lang="it">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Day Manager</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet">
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #12121a;
        --surface2: #1a1a26;
        --border: #2a2a3e;
        --accent: #6ee7b7;
        --accent2: #f59e0b;
        --accent3: #f87171;
        --text: #e2e8f0;
        --muted: #64748b;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'IBM Plex Mono', monospace;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Background grid */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(110, 231, 183, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(110, 231, 183, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .app {
        position: relative;
        z-index: 1;
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }

      /* Header */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: 'Syne', sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .logo span {
        color: var(--accent);
      }

      .week-badge {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .week-badge strong {
        color: var(--accent);
      }

      /* Grid layout */
      .main-grid {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        align-items: start;
      }

      /* Sidebar */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }

      .panel-title {
        font-family: 'Syne', sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 16px;
      }

      /* Form */
      .form-row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 0.7rem;
        color: var(--muted);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input,
      select {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.85rem;
        padding: 8px 12px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 18px;
        border-radius: 8px;
        border: none;
        font-family: 'Syne', sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.5px;
      }

      .btn-primary {
        background: var(--accent);
        color: #000;
        width: 100%;
        justify-content: center;
      }

      .btn-primary:hover {
        background: #34d399;
        transform: translateY(-1px);
      }

      .btn-danger {
        background: transparent;
        border: 1px solid var(--accent3);
        color: var(--accent3);
        font-size: 0.7rem;
        padding: 4px 8px;
      }

      .btn-danger:hover {
        background: var(--accent3);
        color: #000;
      }

      .btn-change {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--accent2);
        font-size: 0.7rem;
        padding: 4px 8px;
      }

      .btn-change:hover {
        border-color: var(--accent2);
      }

      /* Resource list */
      .resource-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .resource-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .resource-item:hover,
      .resource-item.active {
        border-color: var(--accent);
        background: rgba(110, 231, 183, 0.06);
      }

      .resource-name {
        font-family: 'Syne', sans-serif;
        font-weight: 600;
        font-size: 0.85rem;
      }

      .resource-meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .coeff-badge {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 500;
      }

      .coeff-high {
        background: rgba(110, 231, 183, 0.15);
        color: var(--accent);
      }

      .coeff-mid {
        background: rgba(245, 158, 11, 0.15);
        color: var(--accent2);
      }

      .coeff-low {
        background: rgba(248, 113, 113, 0.15);
        color: var(--accent3);
      }

      /* Main content */
      .content {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* Week navigator */
      .week-nav {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .week-nav .btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 16px;
      }

      .week-nav .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .week-label {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        flex: 1;
        text-align: center;
        color: var(--text);
      }

      /* Calendar grid */
      .calendar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .cal-header {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border-bottom: 1px solid var(--border);
      }

      .cal-day-header {
        text-align: center;
        padding: 12px;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        border-right: 1px solid var(--border);
      }

      .cal-day-header:last-child {
        border-right: none;
      }

      .cal-body {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        min-height: 180px;
      }

      .cal-cell {
        border-right: 1px solid var(--border);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 120px;
        position: relative;
        transition: background 0.15s;
      }

      .cal-cell:last-child {
        border-right: none;
      }

      .cal-cell.agile-day {
        background: rgba(110, 231, 183, 0.05);
      }

      .cal-cell.today {
        background: rgba(245, 158, 11, 0.04);
      }

      .day-num {
        font-size: 0.65rem;
        color: var(--muted);
        font-weight: 500;
      }

      /* Resource chips in calendar */
      .chip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.68rem;
        font-family: 'Syne', sans-serif;
        font-weight: 600;
        animation: chipIn 0.2s ease;
      }

      @keyframes chipIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .chip-agile {
        background: rgba(110, 231, 183, 0.15);
        border: 1px solid rgba(110, 231, 183, 0.3);
        color: var(--accent);
      }

      .chip-changed {
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: var(--accent2);
      }

      .chip-remove {
        cursor: pointer;
        opacity: 0.5;
        transition: opacity 0.1s;
        line-height: 1;
      }

      .chip-remove:hover {
        opacity: 1;
      }

      /* Detail panel */
      .detail-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
      }

      .detail-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
        gap: 12px;
      }

      .detail-name {
        font-family: 'Syne', sans-serif;
        font-size: 1.3rem;
        font-weight: 800;
      }

      .detail-role {
        color: var(--muted);
        font-size: 0.75rem;
        margin-top: 2px;
      }

      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .stat-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 16px;
        flex: 1;
        min-width: 100px;
      }

      .stat-label {
        font-size: 0.6rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stat-value {
        font-family: 'Syne', sans-serif;
        font-size: 1.2rem;
        font-weight: 800;
        margin-top: 2px;
      }

      .stat-value.green {
        color: var(--accent);
      }

      .stat-value.amber {
        color: var(--accent2);
      }

      .stat-value.red {
        color: var(--accent3);
      }

      /* Coefficient bar */
      .coeff-track {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 20px;
      }

      .coeff-track-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .coeff-track-label {
        font-size: 0.65rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .coeff-track-value {
        font-family: 'Syne', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: var(--accent);
      }

      .coeff-bar {
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }

      .coeff-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s cubic-bezier(.22, .68, 0, 1.2);
        background: linear-gradient(90deg, var(--accent3), var(--accent2), var(--accent));
      }

      /* Change request */
      .change-form {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
      }

      .change-form-title {
        font-family: 'Syne', sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 12px;
      }

      .days-selector {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }

      .day-btn {
        flex: 1;
        padding: 8px 4px;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.15s;
      }

      .day-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .day-btn.selected {
        background: rgba(110, 231, 183, 0.15);
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
      }

      /* History table */
      .history-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.75rem;
      }

      .history-table th {
        text-align: left;
        color: var(--muted);
        font-size: 0.6rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
      }

      .history-table td {
        padding: 7px 8px;
        border-bottom: 1px solid rgba(42, 42, 62, 0.5);
      }

      .history-table tr:last-child td {
        border-bottom: none;
      }

      .tag {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 4px;
        font-size: 0.65rem;
        font-weight: 600;
      }

      .tag-change {
        background: rgba(245, 158, 11, 0.15);
        color: var(--accent2);
      }

      .tag-stable {
        background: rgba(110, 231, 183, 0.1);
        color: var(--accent);
      }

      /* Coefficient tooltip */
      .algo-info {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.7;
      }

      .algo-info .hl {
        color: var(--accent);
        font-weight: 500;
      }

      .algo-info .hl2 {
        color: var(--accent3);
        font-weight: 500;
      }

      /* Empty state */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .empty .icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 20px;
        font-size: 0.8rem;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(.22, .68, 0, 1.2);
        z-index: 999;
        max-width: 300px;
      }

      #toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      #toast.success {
        border-color: var(--accent);
        color: var(--accent);
      }

      #toast.warning {
        border-color: var(--accent2);
        color: var(--accent2);
      }

      #toast.error {
        border-color: var(--accent3);
        color: var(--accent3);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: var(--surface);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header>
        <div class="logo">My<span>DAY</span> SMART</div>
        <div class="week-badge">Settimana corrente: <strong id="currentWeekLabel">—</strong></div>
      </header>

      <div class="main-grid">
        <!-- Sidebar -->
        <div class="sidebar">
          <!-- Add resource -->
          <div class="panel">
            <div class="panel-title">Nuova Risorsa</div>
            <div class="form-row">
              <label>Nome</label>
              <input type="text" id="inputName" placeholder="Es. Mario Rossi" />
            </div>
            <div class="form-row">
              <label>Ruolo</label>
              <input type="text" id="inputRole" placeholder="Es. Developer" />
            </div>
            <div class="form-row">
              <label>Giorno agile base</label>
              <select id="inputBaseDay">
                <option value="0">Lunedì</option>
                <option value="1">Martedì</option>
                <option value="2">Mercoledì</option>
                <option value="3">Giovedì</option>
                <option value="4">Venerdì</option>
              </select>
            </div>
            <div class="form-row">
              <label>Coefficiente iniziale</label>
              <input type="number" id="inputCoeff" value="5.0" step="0.1" min="0" max="10" />
            </div>
            <button class="btn btn-primary" onclick="addResource()">+ Aggiungi Risorsa</button>
          </div>

          <!-- Algorithm info -->
          <div class="panel">
            <div class="panel-title">Algoritmo</div>
            <div class="algo-info">
              Coefficiente <span class="hl">+0.5</span> per ogni settimana senza cambio<br>
              Coefficiente <span class="hl2">−1.5</span> per ogni cambio effettuato<br><br>
              Range: <span class="hl">0.0 – 10.0</span><br>
              Soglia cambio libero: <span class="hl">≥ 5.0</span>
            </div>
          </div>

          <!-- Resource list -->
          <div class="panel">
            <div class="panel-title">Risorse (<span id="resCount">0</span>)</div>
            <div class="resource-list" id="resourceList">
              <div class="empty">
                <div class="icon">👤</div>Nessuna risorsa
              </div>
            </div>
          </div>
        </div>

        <!-- Main -->
        <div class="content">
          <!-- Week nav -->
          <div class="week-nav">
            <button class="btn" onclick="prevWeek()">← Prec</button>
            <div class="week-label" id="weekLabel">—</div>
            <button class="btn" onclick="nextWeek()">Succ →</button>
          </div>

          <!-- Calendar -->
          <div class="calendar">
            <div class="cal-header">
              <div class="cal-day-header">LUN</div>
              <div class="cal-day-header">MAR</div>
              <div class="cal-day-header">MER</div>
              <div class="cal-day-header">GIO</div>
              <div class="cal-day-header">VEN</div>
            </div>
            <div class="cal-body" id="calBody"></div>
          </div>

          <!-- Detail panel -->
          <div class="detail-panel" id="detailPanel">
            <div class="empty">
              <div class="icon">🖱️</div>Seleziona una risorsa per vedere i dettagli
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      // =====================
      // STATE
      // =====================
      let state = {
        resources: [],
        currentWeekOffset: 0,   // 0 = this week
        selectedId: null,
        nextId: 1,
      };

      const DAYS = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì'];
      const DAYS_SHORT = ['LUN', 'MAR', 'MER', 'GIO', 'VEN'];
      const COEFF_START = 5.0;
      const COEFF_BONUS = 0.5;   // per settimana senza cambio
      const COEFF_PENALTY = 1.5; // per cambio
      const COEFF_MIN = 0.0;
      const COEFF_MAX = 10.0;
      const COEFF_THRESHOLD = 5.0; // min per fare un cambio liberamente

      // =====================
      // WEEK UTILS
      // =====================
      function getWeekStart(offset = 0) {
        const now = new Date();
        const day = now.getDay(); // 0=Dom
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const mon = new Date(now.setDate(diff));
        mon.setHours(0, 0, 0, 0);
        mon.setDate(mon.getDate() + offset * 7);
        return mon;
      }

      function getWeekDates(offset = 0) {
        const mon = getWeekStart(offset);
        return Array.from({ length: 5 }, (_, i) => {
          const d = new Date(mon);
          d.setDate(mon.getDate() + i);
          return d;
        });
      }

      function weekKey(offset = 0) {
        const d = getWeekStart(offset);
        return `${d.getFullYear()}-W${String(getWeekNumber(d)).padStart(2, '0')}`;
      }

      function getWeekNumber(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        const dayNum = date.getUTCDay() || 7;
        date.setUTCDate(date.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
        return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
      }

      function formatDate(d) {
        return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`;
      }

      function isTodayDate(d) {
        const t = new Date();
        return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
      }

      // =====================
      // RESOURCE HELPERS
      // =====================
      function getResource(id) {
        return state.resources.find(r => r.id === id);
      }

      // Get the agile day for a resource in a given week
      function getAgileDay(resource, wKey) {
        if (resource.schedule[wKey] !== undefined) return resource.schedule[wKey];
        return resource.baseDay;
      }

      // Check if a change happened this week
      function isChanged(resource, wKey) {
        if (resource.changes[wKey] === undefined) return false;
        return resource.changes[wKey];
      }

      // Apply weekly coefficient updates up to current week
      function getCoeffAtWeek(resource, targetOffset) {
        // Replay history from week 0 (creation week) to targetOffset
        let coeff = resource.coeff0; // initial coeff at creation
        const startOffset = resource.createdWeekOffset;
        for (let w = startOffset; w <= targetOffset; w++) {
          const wk = weekKeyForOffset(w);
          if (resource.changes[wk]) {
            coeff = Math.max(COEFF_MIN, coeff - COEFF_PENALTY);
          } else if (w > startOffset) {
            coeff = Math.min(COEFF_MAX, coeff + COEFF_BONUS);
          }
        }
        return Math.round(coeff * 10) / 10;
      }

      function weekKeyForOffset(offset) {
        // recalculate from absolute date
        const now = new Date();
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const base = new Date(now);
        base.setDate(diff);
        base.setHours(0, 0, 0, 0);
        base.setDate(base.getDate() + offset * 7);
        return `${base.getFullYear()}-W${String(getWeekNumber(base)).padStart(2, '0')}`;
      }

      function coeffClass(c) {
        if (c >= 7) return 'coeff-high';
        if (c >= 4) return 'coeff-mid';
        return 'coeff-low';
      }

      function coeffStatClass(c) {
        if (c >= 7) return 'green';
        if (c >= 4) return 'amber';
        return 'red';
      }

      // =====================
      // ACTIONS
      // =====================
      function addResource() {
        const name = document.getElementById('inputName').value.trim();
        const role = document.getElementById('inputRole').value.trim();
        const baseDay = parseInt(document.getElementById('inputBaseDay').value);
        const coeff0 = parseFloat(document.getElementById('inputCoeff').value);

        if (!name) { toast('Inserisci un nome', 'warning'); return; }

        const resource = {
          id: state.nextId++,
          name,
          role: role || 'Team Member',
          baseDay,
          coeff0: Math.min(COEFF_MAX, Math.max(COEFF_MIN, coeff0)),
          createdWeekOffset: state.currentWeekOffset,
          schedule: {},   // wKey -> dayIndex (only when changed)
          changes: {},    // wKey -> true when change happened
        };

        state.resources.push(resource);
        document.getElementById('inputName').value = '';
        document.getElementById('inputRole').value = '';

        toast(`${name} aggiunto/a ✓`, 'success');
        render();
      }

      function removeResource(id) {
        state.resources = state.resources.filter(r => r.id !== id);
        if (state.selectedId === id) state.selectedId = null;
        toast('Risorsa rimossa', 'warning');
        render();
      }

      function selectResource(id) {
        state.selectedId = state.selectedId === id ? null : id;
        render();
      }

      function requestChange(id, newDay) {
        const resource = getResource(id);
        const wKey = weekKey(state.currentWeekOffset);
        const coeff = getCoeffAtWeek(resource, state.currentWeekOffset);

        if (coeff < COEFF_THRESHOLD) {
          toast(`Coefficiente troppo basso (${coeff}). Minimo richiesto: ${COEFF_THRESHOLD}`, 'error');
          return;
        }

        const currentAgile = getAgileDay(resource, wKey);
        if (newDay === currentAgile) {
          toast('Giorno già selezionato come agile', 'warning');
          return;
        }

        // Apply change
        resource.schedule[wKey] = newDay;
        resource.changes[wKey] = true;

        toast(`Cambio approvato → ${DAYS[newDay]} (−${COEFF_PENALTY} coeff)`, 'warning');
        render();
      }

      function removeChange(id) {
        const wKey = weekKey(state.currentWeekOffset);
        const resource = getResource(id);
        delete resource.schedule[wKey];
        delete resource.changes[wKey];
        toast('Cambio annullato', 'warning');
        render();
      }

      // =====================
      // NAVIGATION
      // =====================
      function prevWeek() { state.currentWeekOffset--; render(); }
      function nextWeek() { state.currentWeekOffset++; render(); }

      // =====================
      // RENDER
      // =====================
      function render() {
        renderWeekNav();
        renderResourceList();
        renderCalendar();
        renderDetail();
      }

      function renderWeekNav() {
        const dates = getWeekDates(state.currentWeekOffset);
        const wn = getWeekNumber(dates[0]);
        document.getElementById('weekLabel').textContent =
          `Settimana ${wn} · ${formatDate(dates[0])} – ${formatDate(dates[4])} ${dates[0].getFullYear()}`;
        document.getElementById('currentWeekLabel').textContent =
          `W${String(wn).padStart(2, '0')} ${dates[0].getFullYear()}`;
      }

      function renderResourceList() {
        const el = document.getElementById('resourceList');
        document.getElementById('resCount').textContent = state.resources.length;

        if (!state.resources.length) {
          el.innerHTML = '<div class="empty"><div class="icon">👤</div>Nessuna risorsa</div>';
          return;
        }

        el.innerHTML = state.resources.map(r => {
          const coeff = getCoeffAtWeek(r, state.currentWeekOffset);
          const wKey = weekKey(state.currentWeekOffset);
          const changed = isChanged(r, wKey);
          return `
      <div class="resource-item ${state.selectedId === r.id ? 'active' : ''}" onclick="selectResource(${r.id})">
        <div>
          <div class="resource-name">${r.name}</div>
          <div style="font-size:0.65rem;color:var(--muted);margin-top:2px">${r.role}</div>
        </div>
        <div class="resource-meta">
          ${changed ? '<span style="font-size:0.65rem;color:var(--accent2)">⇄</span>' : ''}
          <span class="coeff-badge ${coeffClass(coeff)}">${coeff.toFixed(1)}</span>
          <button class="btn btn-danger" onclick="event.stopPropagation();removeResource(${r.id})">✕</button>
        </div>
      </div>
    `;
        }).join('');
      }

      function renderCalendar() {
        const dates = getWeekDates(state.currentWeekOffset);
        const wKey = weekKey(state.currentWeekOffset);
        const calBody = document.getElementById('calBody');

        // Build day -> resources map
        const dayResources = Array.from({ length: 5 }, () => []);
        state.resources.forEach(r => {
          const agileDay = getAgileDay(r, wKey);
          const changed = isChanged(r, wKey);
          dayResources[agileDay].push({ r, changed });
        });

        calBody.innerHTML = dates.map((d, i) => {
          const isToday = isTodayDate(d);
          const chips = dayResources[i].map(({ r, changed }) => `
      <div class="chip ${changed ? 'chip-changed' : 'chip-agile'}">
        <span>${r.name.split(' ')[0]}</span>
        ${changed ? `<span class="chip-remove" onclick="removeChange(${r.id})" title="Annulla cambio">×</span>` : ''}
      </div>
    `).join('');

          return `
      <div class="cal-cell ${chips ? 'agile-day' : ''} ${isToday ? 'today' : ''}">
        <div class="day-num">${formatDate(d)}${isToday ? ' ●' : ''}</div>
        ${chips || ''}
      </div>
    `;
        }).join('');
      }

      function renderDetail() {
        const el = document.getElementById('detailPanel');
        if (!state.selectedId) {
          el.innerHTML = '<div class="empty"><div class="icon">🖱️</div>Seleziona una risorsa per vedere i dettagli</div>';
          return;
        }

        const r = getResource(state.selectedId);
        if (!r) return;

        const wKey = weekKey(state.currentWeekOffset);
        const coeff = getCoeffAtWeek(r, state.currentWeekOffset);
        const coeffPct = ((coeff - COEFF_MIN) / (COEFF_MAX - COEFF_MIN)) * 100;
        const currentAgile = getAgileDay(r, wKey);
        const changed = isChanged(r, wKey);
        const canChange = coeff >= COEFF_THRESHOLD;

        // Count total changes
        const totalChanges = Object.values(r.changes).filter(Boolean).length;

        // Build history (last 8 weeks)
        let historyRows = '';
        for (let wo = r.createdWeekOffset; wo <= state.currentWeekOffset; wo++) {
          const wk = weekKeyForOffset(wo);
          const wDates = getWeekDates(wo);
          const aD = r.schedule[wk] !== undefined ? r.schedule[wk] : r.baseDay;
          const chg = r.changes[wk];
          const c = getCoeffAtWeek(r, wo);
          historyRows = `
      <tr>
        <td style="color:var(--muted)">${formatDate(wDates[0])}–${formatDate(wDates[4])}</td>
        <td>${DAYS[aD]}</td>
        <td><span class="tag ${chg ? 'tag-change' : 'tag-stable'}">${chg ? 'CAMBIO' : 'STABILE'}</span></td>
        <td style="color:${c >= 7 ? 'var(--accent)' : c >= 4 ? 'var(--accent2)' : 'var(--accent3)'}">${c.toFixed(1)}</td>
      </tr>
    ` + historyRows;
        }

        const daysBtns = DAYS.map((day, i) => `
    <button class="day-btn ${currentAgile === i && !changed ? 'selected' : ''} ${changed && r.schedule[wKey] === i ? 'selected' : ''}"
      onclick="requestChange(${r.id}, ${i})"
      ${i === currentAgile && !changed ? 'disabled title="Giorno attuale"' : ''}>
      ${DAYS_SHORT[i]}
    </button>
  `).join('');

        el.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name">${r.name}</div>
        <div class="detail-role">${r.role} · Giorno base: ${DAYS[r.baseDay]}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.65rem;color:var(--muted)">Oggi agile</div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;color:var(--accent);font-size:0.9rem">${DAYS[currentAgile]}</div>
        ${changed ? '<div style="font-size:0.65rem;color:var(--accent2)">⇄ Cambiato</div>' : ''}
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Coefficiente</div>
        <div class="stat-value ${coeffStatClass(coeff)}">${coeff.toFixed(1)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Totale cambi</div>
        <div class="stat-value amber">${totalChanges}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Cambio libero</div>
        <div class="stat-value ${canChange ? 'green' : 'red'}">${canChange ? 'SÌ' : 'NO'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Settimana</div>
        <div class="stat-value">${getWeekNumber(getWeekStart(state.currentWeekOffset))}</div>
      </div>
    </div>

    <div class="coeff-track">
      <div class="coeff-track-header">
        <span class="coeff-track-label">Livello Coefficiente</span>
        <span class="coeff-track-value">${coeff.toFixed(1)} / ${COEFF_MAX}</span>
      </div>
      <div class="coeff-bar">
        <div class="coeff-fill" style="width:${coeffPct}%"></div>
      </div>
    </div>

    <div class="change-form">
      <div class="change-form-title">Richiedi Cambio Giorno (Settimana Corrente)</div>
      <div class="days-selector">${daysBtns}</div>
      ${changed ? `<button class="btn btn-danger" onclick="removeChange(${r.id})">✕ Annulla cambio settimana corrente</button>` : ''}
      ${!canChange ? `<div style="font-size:0.7rem;color:var(--accent3);margin-top:8px">⚠ Coefficiente insufficiente. Minimo: ${COEFF_THRESHOLD}</div>` : ''}
    </div>

    ${historyRows ? `
    <div style="margin-top:16px">
      <div class="panel-title" style="margin-bottom:10px">Storico Settimane</div>
      <table class="history-table">
        <thead><tr><th>Settimana</th><th>Giorno Agile</th><th>Stato</th><th>Coeff.</th></tr></thead>
        <tbody>${historyRows}</tbody>
      </table>
    </div>
    ` : ''}
  `;
      }

      // =====================
      // TOAST
      // =====================
      let toastTimer;
      function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.className = ''; }, 3000);
      }

      // =====================
      // INIT
      // =====================
      render();
    </script>
